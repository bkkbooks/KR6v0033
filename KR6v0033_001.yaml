body:
  text: 龍猛菩薩作差別十二支能仁說緣生於煩惱業苦三中俱攝盡初八九煩惱二及十是業餘七皆是苦十二唯三攝從三生於二從二生於七七復生於三此有輪數轉諸趣唯因果此中無衆生唯從於空法還生於空法誦燈鏡及印火精種梅聲諸蘊相續結不移智應察於甚微細事若有見斷者彼不善因緣未見緣生義此中無可遣亦無少安立於真以觀真見真而解脫録文完
