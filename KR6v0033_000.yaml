body:
  text: 因緣心論頌整理者華方田題解因緣心論頌印度大乘佛教中觀學派典籍龍樹撰一卷本文獻作者龍樹又譯龍猛是大乘佛教鼻祖印度大乘佛教中觀學派的創始人有第二佛陀之稱生存年代約公元年年龍樹著述頗豐有千部論主之稱其代表作是中論十二門論大毗婆沙論大智度論等因緣心論頌也是其重要著作之一是研究龍樹及其大乘中觀學説的重要資料本文獻全文共字篇幅雖短立論精要以頌文的形式論述了佛教的基本理論緣起論以及作者站在大乘空宗的立場上對緣起論的新的闡釋本文獻未為我國歷代大藏經所收近代在敦煌發現後被收録於大正藏第三十二卷第一六五四部但由於僅用了兩個本子斯號和斯號且錯訛較多因此有必要進行重新整理同時為了盡可能地避免錯誤整理者將因緣心論頌因緣心論釋和因緣心釋論開決記三篇文獻作了仔細地對勘具體情況隨文説明整理本的底校本情況如下底本中國北京圖書館藏北海號校本甲本中國北京圖書館藏北官號乙本斯號丙本伯號丁本斯號戊本斯號己本北雨號録文
